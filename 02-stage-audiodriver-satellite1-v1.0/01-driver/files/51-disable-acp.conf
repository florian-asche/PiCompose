monitor.alsa.rules = [
    {
        matches = [
            {
                device.name = "alsa_card.platform-soc_sound"
            }
        ]
        actions = {
            update-props = {
                api.alsa.use-acp = false
                api.acp.auto-profile = false
                api.acp.auto-port = false
            }
        }
    }
]
